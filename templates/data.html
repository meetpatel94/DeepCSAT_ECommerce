<!DOCTYPE html>
<html>

<head>

<title>Dataset Table</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2 class="text-center">Ecommerce Customer Support Dataset</h2>

<div class="table-responsive">

{{ table | safe }}

</div>

<div class="text-center mt-3">

{% if prev_page %}
<a href="/data?page={{ prev_page }}" class="btn btn-secondary">Previous</a>
{% endif %}

<a href="/data?page={{ next_page }}" class="btn btn-primary">Next</a>

</div>

</div>

</body>

</html>
